services:
  mysql:
    image: mysql:8
    container_name: vote-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: votedb
    ports:
      - "3307:3306"
    networks:
      - pro-network
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: vote-app
    depends_on:
      mysql:
        condition: service_healthy   # 🔥 VERY IMPORTANT
    ports:
      - "8080:8080"
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/votedb
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    networks:
      - pro-network

networks:
  pro-network:

volumes:
  mysql-data: