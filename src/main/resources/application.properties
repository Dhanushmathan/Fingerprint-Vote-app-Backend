spring.application.name=Vote-App

# ── Server ──────────────────────────────────────────────────
server.port=${PORT:8080}

# ── MySQL Database ───────────────────────────────────────────
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/votedb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.security.user.name=admin
spring.security.user.password=admin123

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:VoteSecure2025SuperSecretKeyForJWTTokenGenerationMustBe256BitsLong!}
app.jwt.expiration=86400000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ── Logging ──────────────────────────────────────────────────
logging.level.com.votesecure=INFO
logging.level.org.springframework.security=WARN

# ── Actuator health check (Render uses this) ─────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
